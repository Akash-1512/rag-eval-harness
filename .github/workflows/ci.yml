name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "refactor/**", "docs/**", "ci/**", "chore/**"]
  pull_request:
    branches: [main, develop]

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Run ruff — check formatting and style
        run: ruff check . --select "E,F,W,I" --ignore "E501"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        # NOTE: no || echo fallback — real failures must fail CI
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MLFLOW_TRACKING_URI: "sqlite:///tmp/mlflow_ci.db"

      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false   # coverage upload failure != test failure

  quality-gate:
    name: Quality Gate (RAGAS thresholds)
    runs-on: ubuntu-latest
    needs: test
    # Only runs on develop and main — not on every feature branch push
    # Reason: quality gate makes real LLM calls (~3 min, uses Groq quota)
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RAGAS quality gate
        # Exit code 1 fails CI if faithfulness < 0.75 or context_recall < 0.60
        run: python tests/quality_gate.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MLFLOW_TRACKING_URI: "sqlite:///tmp/mlflow_ci.db"
