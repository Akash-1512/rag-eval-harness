repos:
  # Ruff — replaces both black (formatting) and flake8 (linting)
  # Faster than black+flake8, modern standard as of 2024
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --select, "E,F,W,I", --ignore, "E501"]
      - id: ruff-format

  # Secrets detection — blocks accidental API key commits
  # Critical: GROQ_API_KEY, AZURE_OPENAI_KEY must never reach remote
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  # Basic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements        # blocks leftover breakpoint() calls
