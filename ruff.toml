# ruff.toml — project-level ruff configuration
# Keeps CI lint step and local pre-commit hook consistent

[lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]   # line length not enforced — docstrings make this impractical

[lint.per-file-ignores]
"tests/*" = ["F401"]   # unused imports allowed in test files

exclude = [
    "venv/",
    ".venv/",
    "__pycache__/",
    "*.egg-info",
    "build/",
    "dist/",
]
