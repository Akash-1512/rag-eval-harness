# ruff.toml — project-level ruff configuration
# exclude must be top-level — not under [lint]

exclude = [
    "venv/",
    ".venv/",
    "__pycache__/",
    "*.egg-info",
    "build/",
    "dist/",
]

[lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[lint.per-file-ignores]
"tests/*" = ["F401"]
